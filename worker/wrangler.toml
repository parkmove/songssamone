name = "songssam-api"
main = "src/index.ts"
compatibility_date = "2026-03-01"

# Routes는 실제 운영에 맞게 1개만 확정하세요.
# api.songssam.one 을 Worker에 연결할 거면 아래처럼.
routes = [
  { pattern = "api.songssam.one/*", zone_name = "songssam.one" }
]

[[queues.producers]]
queue = "lead-queue-v2"
binding = "LEAD_QUEUE-V2"

[[queues.consumers]]
queue = "lead-queue-v2"
max_batch_size = 100
max_batch_timeout = 5

[vars]
GOOGLE_SHEETS_SHEET_NAME = "leads"
CRM_RAW_SHEET_NAME = "songssamone_raw"
CRM_AUTH_SHEET_NAME = "crm_auth"